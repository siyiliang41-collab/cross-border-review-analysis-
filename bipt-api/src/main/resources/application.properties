# 服务端口
server.port=8080

# MySQL 数据源（Hadoop 集群 hadoop01 节点）
spring.datasource.url=jdbc:mysql://192.168.229.101:3306/bipt_project?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=Root@123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Druid 连接池
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.initial-size=5
spring.datasource.druid.max-active=20
spring.datasource.druid.min-idle=5

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true
